name: Deploy Astro to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'autosave-astro/**'
      - '.github/workflows/deploy-astro.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DEPLOY_TARGET: github-pages
    defaults:
      run:
        working-directory: ./autosave-astro
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: autosave-astro/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Astro deploy-dist
        run: pnpm build:dist

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: autosave-astro/deploy-dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
