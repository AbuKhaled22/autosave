name: Deploy Astro to Cloudflare Pages (Manual)

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-pages-autosave-astro
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./autosave-astro

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: autosave-astro/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build deploy-dist
        run: pnpm build:dist

      - name: Validate Cloudflare project variable
        run: |
          if [ -z "${{ vars.CLOUDFLARE_PAGES_PROJECT }}" ]; then
            echo "Repository variable CLOUDFLARE_PAGES_PROJECT is missing."
            exit 1
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >
            pages deploy autosave-astro/deploy-dist
            --project-name ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
            --branch ${{ github.ref_name }}
